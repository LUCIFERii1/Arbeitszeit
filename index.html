<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbeitszeiterfassung</title>
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Arbeitszeit">
<link rel="apple-touch-icon" id="apple-icon">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;font-family:'Inter',Arial,sans-serif;color:#e2e8f0;min-height:100vh;padding-bottom:env(safe-area-inset-bottom);}

/* Header */
.header{background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(16,185,129,0.2);padding:0 1.25rem;padding-top:env(safe-area-inset-top);height:calc(64px + env(safe-area-inset-top));display:flex;align-items:flex-end;padding-bottom:0.85rem;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-title{font-size:1rem;font-weight:800;background:linear-gradient(135deg,#10b981,#06d6a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.04em;text-transform:uppercase;}
.sw-badge{font-size:0.68rem;color:#10b981;font-weight:600;background:rgba(16,185,129,0.1);padding:0.25rem 0.6rem;border-radius:20px;border:1px solid rgba(16,185,129,0.3);}
.install-btn{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;border-radius:20px;padding:0.3rem 0.9rem;font-size:0.68rem;font-weight:700;cursor:pointer;display:none;}

main{max-width:560px;margin:0 auto;padding:1.25rem 0.875rem 4rem;}

/* Cards */
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:1.5rem;margin-bottom:1rem;backdrop-filter:blur(10px);position:relative;overflow:hidden;}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(16,185,129,0.4),transparent);}
.card-title{font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#10b981;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:0.4rem;}

/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1rem;}
.full{grid-column:1/-1;}
.field label{display:block;font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#64748b;margin-bottom:0.4rem;}
.field input{display:block;width:100%;padding:0.75rem 1rem;border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;font-size:0.95rem;font-weight:500;color:#f1f5f9;background:rgba(255,255,255,0.04);outline:none;-webkit-appearance:none;appearance:none;transition:all 0.2s;color-scheme:dark;}
.field input:focus{border-color:#10b981;background:rgba(16,185,129,0.06);box-shadow:0 0 0 3px rgba(16,185,129,0.1);}

/* Preview */
.preview{background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.06);border-radius:10px;padding:0.75rem 1rem;text-align:center;font-size:0.9rem;font-weight:500;color:#475569;margin-bottom:1rem;min-height:46px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.preview.ok{background:rgba(16,185,129,0.08);border-color:rgba(16,185,129,0.3);color:#10b981;font-weight:700;}

/* Save button */
.btn-save{width:100%;padding:0.9rem;background:linear-gradient(135deg,#10b981 0%,#059669 100%);color:#fff;border:none;border-radius:12px;font-size:0.9rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;cursor:pointer;box-shadow:0 4px 20px rgba(16,185,129,0.3);transition:all 0.2s;position:relative;overflow:hidden;}
.btn-save::after{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transition:left 0.4s;}
.btn-save:active::after{left:100%;}
.btn-save:active{transform:scale(0.98);box-shadow:0 2px 10px rgba(16,185,129,0.2);}

/* Month select */
.month-sel{width:100%;padding:0.75rem 1rem;border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;font-size:0.95rem;font-weight:500;color:#f1f5f9;background:rgba(255,255,255,0.04);outline:none;-webkit-appearance:none;appearance:none;margin-bottom:1rem;color-scheme:dark;}

/* Export row */
.export-row{display:flex;gap:0.5rem;margin-bottom:1rem;}
.btn-csv{flex:1;padding:0.65rem;background:transparent;color:#94a3b8;border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer;transition:all 0.2s;}
.btn-csv:active{background:rgba(255,255,255,0.05);color:#f1f5f9;}
.btn-print{flex:1;padding:0.65rem;background:rgba(255,255,255,0.06);color:#f1f5f9;border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer;transition:all 0.2s;}
.btn-print:active{background:rgba(255,255,255,0.1);}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;margin-bottom:1.25rem;}
.stat{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:0.875rem 0.25rem;text-align:center;position:relative;overflow:hidden;}
.stat::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(16,185,129,0.3),transparent);}
.stat-val{font-size:1.2rem;font-weight:800;color:#f1f5f9;line-height:1.1;margin-bottom:0.25rem;}
.stat-val.green{background:linear-gradient(135deg,#10b981,#06d6a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-lbl{font-size:0.55rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#475569;}

/* Entry cards */
.entry-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:1rem 1rem;margin-bottom:0.5rem;position:relative;transition:all 0.15s;}
.entry-card:active{background:rgba(255,255,255,0.04);border-color:rgba(16,185,129,0.2);}
.entry-date{font-size:0.72rem;font-weight:600;color:#475569;margin-bottom:0.6rem;letter-spacing:0.03em;}
.entry-fields{display:grid;grid-template-columns:repeat(4,1fr);gap:0.25rem;}
.ef-item{display:flex;flex-direction:column;gap:0.15rem;}
.ef-lbl{font-size:0.54rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#334155;}
.ef-val{font-size:0.88rem;font-weight:600;color:#cbd5e1;}
.ef-val.green{background:linear-gradient(135deg,#10b981,#06d6a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:0.95rem;font-weight:800;}
.del-btn{position:absolute;top:0.7rem;right:0.7rem;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#ef4444;font-size:0.72rem;font-weight:700;cursor:pointer;padding:0.25rem 0.5rem;border-radius:6px;}
.del-btn:active{background:rgba(239,68,68,0.2);}

/* Empty state */
.empty{text-align:center;padding:3rem 1rem;color:#334155;font-size:0.85rem;}

/* Toast */
#toast{position:fixed;bottom:calc(1.25rem + env(safe-area-inset-bottom));left:1rem;right:1rem;background:#0f172a;color:#10b981;font-size:0.82rem;font-weight:600;padding:0.875rem 1.25rem;border-radius:12px;border:1px solid rgba(16,185,129,0.3);opacity:0;transform:translateY(8px);transition:opacity 0.2s,transform 0.2s;pointer-events:none;z-index:999;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
#toast.show{opacity:1;transform:translateY(0);}

@media print{
  .header,.no-print,.modal-actions,.modal-header{display:none!important;}
  .modal-overlay{position:static!important;background:none!important;padding:0!important;}
  .modal-box{box-shadow:none!important;border-radius:0!important;}
  .entries-section{display:none!important;}
  body{background:#fff;}
}

  .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:200;display:none;overflow-y:auto;padding:1rem;}
.modal-overlay.show{display:block;}
.modal-box{background:#fff;border-radius:12px;max-width:700px;margin:0 auto;overflow:hidden;}
.modal-header{background:#0f172a;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;}
.modal-header h2{color:#fff;font-size:1rem;font-weight:700;margin:0;}
.modal-header span{color:#10b981;font-size:0.8rem;}
.modal-actions{display:flex;gap:0.5rem;padding:1rem 1.25rem;background:#f8fafc;border-bottom:1px solid #e2e8f0;}
.modal-print-btn{flex:1;padding:0.65rem;background:#10b981;color:#fff;border:none;border-radius:8px;font-size:0.8rem;font-weight:700;text-transform:uppercase;cursor:pointer;}
.modal-close-btn{padding:0.65rem 1rem;background:transparent;color:#475569;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.8rem;font-weight:700;cursor:pointer;}
.modal-content{padding:1.5rem;color:#1e293b;font-family:Arial,sans-serif;}
</style>
</head>
<body>
<header class="header">
<div class="header-title">Arbeitszeiterfassung</div>
<div style="display:flex;align-items:center;gap:0.6rem;">
<button class="install-btn" id="install-btn" onclick="installPWA()">+ App</button>
<span class="sw-badge" id="sw-status">PWA</span>
</div>
</header>
<main>
<div class="card no-print">
<div class="card-title">Neuer Eintrag</div>
<div class="form-grid">
<div class="field full"><label for="inp-date">Datum</label><input type="date" id="inp-date"></div>
<div class="field"><label for="inp-start">Beginn</label><input type="time" id="inp-start"></div>
<div class="field"><label for="inp-end">Ende</label><input type="time" id="inp-end"></div>
<div class="field full"><label for="inp-break">Pause (Minuten)</label><input type="number" id="inp-break" min="0" max="480" step="5" placeholder="0"></div>
</div>
<div class="preview" id="preview">Nettozeit wird berechnet...</div>
<button class="btn-save" onclick="saveEntry()">Eintrag speichern</button>
</div>
<div class="card">
<div class="card-title">Monatsübersicht</div>
<select class="month-sel" id="month-select" onchange="renderEntries()"></select>
<div class="export-row no-print">
<button class="btn-csv" onclick="exportCSV()">CSV Export</button>
<button class="btn-print" onclick="drucken()">Drucken / PDF</button>
</div>
<div class="stats">
<div class="stat"><div class="stat-val green" id="stat-total">0:00</div><div class="stat-lbl">Gesamt</div></div>
<div class="stat"><div class="stat-val" id="stat-days">0</div><div class="stat-lbl">Tage</div></div>
<div class="stat"><div class="stat-val" id="stat-avg">0:00</div><div class="stat-lbl">Ø / Tag</div></div>
</div>
<div id="entries-list" class="entries-section"><div class="empty">Noch keine Eintraege vorhanden.</div></div>
</div>
</main>
<div class="print-area" id="print-area"></div>
<div id="toast"></div>

var dp = null;
window.addEventListener("beforeinstallprompt", function(e){ e.preventDefault(); dp = e; document.getElementById("install-btn").style.display = "block"; });
function installPWA(){ if(!dp)return; dp.prompt(); dp.userChoice.then(function(){ dp=null; document.getElementById("install-btn").style.display="none"; }); }

var KEY = "arbeitszeit_v1";
function load(){ try{ return JSON.parse(localStorage.getItem(KEY))||[]; }catch(e){ return []; } }
function store(d){ localStorage.setItem(KEY, JSON.stringify(d)); }

function calcNet(s,e,b){
  if(!s||!e) return null;
  var sp=s.split(":"), ep=e.split(":");
  var st=parseInt(sp[0])*60+parseInt(sp[1]);
  var en=parseInt(ep[0])*60+parseInt(ep[1]);
  if(en<=st) en+=1440;
  var n=en-st-(parseInt(b)||0);
  return n>0?n:0;
}
function fmt(m){ if(m==null)return"--"; return Math.floor(m/60)+":"+("0"+m%60).slice(-2); }
function fmtDate(d){ if(!d)return"--"; var p=d.split("-"); return p[2]+"."+p[1]+"."+p[0]; }
function mk(d){ return d?d.slice(0,7):null; }
function toast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(function(){ t.classList.remove("show"); },2500);
}

function updatePreview(){
  var s=document.getElementById("inp-start").value;
  var e=document.getElementById("inp-end").value;
  var b=document.getElementById("inp-break").value;
  var n=calcNet(s,e,b);
  var el=document.getElementById("preview");
  if(n!=null){ el.textContent="Nettozeit: "+fmt(n)+" Stunden"; el.className="preview ok"; }
  else { el.textContent="Nettozeit wird berechnet..."; el.className="preview"; }
}
document.getElementById("inp-start").addEventListener("input", updatePreview);
document.getElementById("inp-end").addEventListener("input", updatePreview);
document.getElementById("inp-break").addEventListener("input", updatePreview);

function buildMonths(){
  var entries=load();
  var months={};
  entries.forEach(function(e){ if(mk(e.date)) months[mk(e.date)]=1; });
  var now=new Date();
  var cur=now.getFullYear()+"-"+("0"+(now.getMonth()+1)).slice(-2);
  months[cur]=1;
  var sorted=Object.keys(months).sort().reverse();
  var sel=document.getElementById("month-select");
  var prev=sel.value;
  sel.innerHTML="";
  sorted.forEach(function(key){
    var p=key.split("-");
    var d=new Date(parseInt(p[0]),parseInt(p[1])-1,1);
    var label=d.toLocaleDateString("de-DE",{month:"long",year:"numeric"});
    var o=document.createElement("option");
    o.value=key; o.textContent=label; sel.appendChild(o);
  });
  if(prev && months[prev]) sel.value=prev;
  else if(months[cur]) sel.value=cur;
  else if(sorted.length) sel.value=sorted[0];
}

function saveEntry(){
  var date=document.getElementById("inp-date").value;
  var start=document.getElementById("inp-start").value;
  var end=document.getElementById("inp-end").value;
  var brk=parseInt(document.getElementById("inp-break").value)||0;
  if(!date){ toast("Bitte Datum eingeben!"); return; }
  if(!start){ toast("Bitte Beginn eingeben!"); return; }
  if(!end){ toast("Bitte Ende eingeben!"); return; }
  var net=calcNet(start,end,brk);
  if(!net){ toast("Ungueltige Zeiteingabe!"); return; }
  var entries=load();
  entries.push({id:Date.now(),date:date,start:start,end:end,brk:brk,net:net});
  entries.sort(function(a,b){ return a.date.localeCompare(b.date); });
  store(entries);
  buildMonths();
  document.getElementById("month-select").value=mk(date);
  renderEntries();
  toast("Eintrag gespeichert!");
  document.getElementById("inp-start").value="";
  document.getElementById("inp-end").value="";
  document.getElementById("inp-break").value="";
  updatePreview();
}

function deleteEntry(id){
  if(!confirm("Eintrag loeschen?")) return;
  store(load().filter(function(e){ return e.id!==id; }));
  buildMonths(); renderEntries(); toast("Eintrag geloescht.");
}

function renderEntries(){
  var mkey=document.getElementById("month-select").value;
  var entries=load().filter(function(e){ return mk(e.date)===mkey; });
  var list=document.getElementById("entries-list");
  if(!entries.length){
    list.innerHTML="<div class=\"empty\">Keine Eintraege fuer diesen Monat.</div>";
    document.getElementById("stat-total").textContent="0:00";
    document.getElementById("stat-days").textContent="0";
    document.getElementById("stat-avg").textContent="0:00";
    return;
  }
  var total=0; entries.forEach(function(e){ total+=(e.net||0); });
  var days=entries.length, avg=Math.round(total/days);
  document.getElementById("stat-total").textContent=fmt(total)+" h";
  document.getElementById("stat-days").textContent=days;
  document.getElementById("stat-avg").textContent=fmt(avg)+" h";
  var html="";
  entries.forEach(function(e){
    html+="<div class=\"entry-card\">";
    html+="<div class=\"entry-date\">Datum: "+fmtDate(e.date)+"</div>";
    html+="<div class=\"entry-fields\">";
    html+="<div class=\"ef-item\"><span class=\"ef-lbl\">Beginn</span><span class=\"ef-val\">"+(e.start||"--")+"</span></div>";
    html+="<div class=\"ef-item\"><span class=\"ef-lbl\">Ende</span><span class=\"ef-val\">"+(e.end||"--")+"</span></div>";
    html+="<div class=\"ef-item\"><span class=\"ef-lbl\">Pause</span><span class=\"ef-val\">"+(e.brk||0)+"min</span></div>";
    html+="<div class=\"ef-item\"><span class=\"ef-lbl\">Netto</span><span class=\"ef-val green\">"+fmt(e.net)+"h</span></div>";
    html+="</div>";
    html+="<button class=\"del-btn\" onclick=\"deleteEntry("+e.id+")\">&times;</button>";
    html+="</div>";
  });
  list.innerHTML=html;
}

function exportCSV(){
  var mkey=document.getElementById("month-select").value;
  var entries=load().filter(function(e){ return mk(e.date)===mkey; });
  if(!entries.length){ toast("Keine Daten."); return; }
  var rows=[["Datum","Beginn","Ende","Pause (Min)","Nettozeit (h)"]];
  entries.forEach(function(e){ rows.push([fmtDate(e.date),e.start,e.end,e.brk||0,fmt(e.net).replace(":",",")]); });
  var csv=rows.map(function(r){ return r.join(";"); }).join("\r\n");
  var a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
  a.download="arbeitszeit_"+mkey+".csv"; a.click();
  toast("CSV exportiert!");
}

  w.document.write("@media print{@page{margin:1.5cm;}thead tr{-webkit-print-color-adjust:exact;print-color-adjust:exact;}.top{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}");
  w.document.write("</style></head><body>");
  w.document.write("<div class='top'><h1>Arbeitszeiterfassung</h1><p>Monatsbericht - "+label+" - Erstellt: "+new Date().toLocaleDateString("de-DE")+"</p></div>");
  w.document.write("<div class='stats'>");
  w.document.write("<div class='stat'><div class='stat-val'>"+fmt(total)+" h</div><div class='stat-lbl'>Gesamt</div></div>");
  w.document.write("<div class='stat'><div class='stat-val dark'>"+days+"</div><div class='stat-lbl'>Arbeitstage</div></div>");
  w.document.write("<div class='stat'><div class='stat-val dark'>"+fmt(avg)+" h</div><div class='stat-lbl'>Ø pro Tag</div></div>");
  w.document.write("</div>");
  w.document.write("<table><thead><tr><th>Datum</th><th>Beginn</th><th>Ende</th><th>Pause</th><th>Nettozeit</th></tr></thead><tbody>"+rows+"</tbody></table>");
  w.document.write("<div class='footer'>Arbeitszeiterfassung - "+label+"</div>");
  w.document.write("</body></html>");
  w.document.close();
  w.focus();
  setTimeout(function(){ w.print(); }, 500);
}

function closeModal(){
  document.getElementById("pdf-modal").classList.remove("show");
}

document.getElementById("inp-date").value = new Date().toISOString().slice(0,10);
buildMonths();
